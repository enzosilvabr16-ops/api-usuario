
services:

  postgres:
    image: postgres:16
    container_name: postgres_apiusuarios
    restart: always
    environment:
      POSTGRES_USER: apiusuarios
      POSTGRES_PASSWORD: coti2026
      POSTGRES_DB: bdapiusuarios
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede_api

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_apiusuarios
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - rede_api

volumes:
  postgres_data:
  pgadmin_data:

networks:
  rede_api:
    driver: bridge